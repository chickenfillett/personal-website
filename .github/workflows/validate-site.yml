name: Validate site

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: validate-site-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Build failed. Showing the final diagnostic lines:"
            tail -n 120 build-output.log
            exit "$status"
          fi
          tail -n 40 build-output.log

      - name: Publish build diagnostics
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '### Build diagnostics'
            echo
            echo '```text'
            tail -n 80 build-output.log
            echo '```'
          } > build-comment.md
          gh pr comment "$PR_NUMBER" --body-file build-comment.md
